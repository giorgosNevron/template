<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Selectech</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles-2.css" />
  <link rel="icon" href="asset/favicon.ico" type="image/x-icon">
</head>
<body>
  <!-- Interactive background layers -->
  <div class="bg-layer bg-layer-1"></div>
  <div class="bg-layer bg-layer-2"></div>
  <div class="bg-layer bg-layer-3"></div>
  
  <!-- Animated grid overlay -->
  <div class="grid-overlay"></div>
  
  <!-- Floating particles -->
  <div class="particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
  </div>

  <!-- Interactive light orbs that follow cursor -->
  <div class="cursor-light"></div>

  <div class="center-container">
    <div class="content-box">
      <div class="logo-container">
        <img src="asset/4-removebg-preview.png" alt="Selectech Logo" class="logo" />
        <div class="logo-glow"></div>
      </div>
      <div class="scan-line"></div>
      
      <!-- Event Label -->
      <div class="event-label">
        <span class="label-text">CARNIVAL NIGHT SHIFT ||</span>
      </div>
      
      <!-- CTA Button -->
      <a href="https://ticket-form.selectechcy.com/" class="cta-button" target="_blank" rel="noopener noreferrer">
        <span class="button-text">GET TICKETS</span>
        <span class="button-arrow">→</span>
        <div class="button-glow"></div>
      </a>
    </div>
  </div>

  <!-- Corner accents -->
  <div class="corner-accent corner-tl"></div>
  <div class="corner-accent corner-tr"></div>
  <div class="corner-accent corner-bl"></div>
  <div class="corner-accent corner-br"></div>

  <script>
    // Parallax effect on mouse move
    document.addEventListener('mousemove', (e) => {
      const mouseX = e.clientX / window.innerWidth;
      const mouseY = e.clientY / window.innerHeight;
      
      // Move background layers at different speeds
      const layer1 = document.querySelector('.bg-layer-1');
      const layer2 = document.querySelector('.bg-layer-2');
      const layer3 = document.querySelector('.bg-layer-3');
      
      layer1.style.transform = `translate(${mouseX * 20}px, ${mouseY * 20}px)`;
      layer2.style.transform = `translate(${mouseX * 40}px, ${mouseY * 40}px)`;
      layer3.style.transform = `translate(${mouseX * 60}px, ${mouseY * 60}px)`;
      
      // Move cursor light
      const cursorLight = document.querySelector('.cursor-light');
      cursorLight.style.left = `${e.clientX}px`;
      cursorLight.style.top = `${e.clientY}px`;
      
      // Subtle tilt on content box
      const contentBox = document.querySelector('.content-box');
      const rotateX = (mouseY - 0.5) * 5;
      const rotateY = (mouseX - 0.5) * -5;
      contentBox.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
    });

    // Device orientation for mobile (tilt effect)
    if (window.DeviceOrientationEvent) {
      window.addEventListener('deviceorientation', (e) => {
        const gamma = e.gamma; // Left to right tilt (-90 to 90)
        const beta = e.beta;   // Front to back tilt (-180 to 180)
        
        const layer1 = document.querySelector('.bg-layer-1');
        const layer2 = document.querySelector('.bg-layer-2');
        const layer3 = document.querySelector('.bg-layer-3');
        
        if (layer1 && gamma !== null && beta !== null) {
          layer1.style.transform = `translate(${gamma * 0.3}px, ${beta * 0.3}px)`;
          layer2.style.transform = `translate(${gamma * 0.6}px, ${beta * 0.6}px)`;
          layer3.style.transform = `translate(${gamma * 0.9}px, ${beta * 0.9}px)`;
        }
      });
    }

    // Scroll effect (if you add scrollable content later)
    window.addEventListener('scroll', () => {
      const scrolled = window.pageYOffset;
      const layers = document.querySelectorAll('.bg-layer');
      
      layers.forEach((layer, index) => {
        const speed = (index + 1) * 0.3;
        layer.style.transform += ` translateY(${scrolled * speed}px)`;
      });
    });

    // Click ripple effect on background
    document.addEventListener('click', (e) => {
      if (e.target.classList.contains('cta-button') || 
          e.target.closest('.cta-button') ||
          e.target.closest('.content-box')) {
        return; // Don't create ripple on buttons or content box
      }
      
      const ripple = document.createElement('div');
      ripple.className = 'click-ripple';
      ripple.style.left = e.clientX + 'px';
      ripple.style.top = e.clientY + 'px';
      document.body.appendChild(ripple);
      
      setTimeout(() => {
        ripple.remove();
      }, 1000);
    });

    // Ambient particles respond to mouse
    document.addEventListener('mousemove', (e) => {
      const particles = document.querySelectorAll('.particle');
      const mouseX = e.clientX;
      const mouseY = e.clientY;
      
      particles.forEach(particle => {
        const rect = particle.getBoundingClientRect();
        const particleX = rect.left + rect.width / 2;
        const particleY = rect.top + rect.height / 2;
        
        const distance = Math.sqrt(
          Math.pow(mouseX - particleX, 2) + Math.pow(mouseY - particleY, 2)
        );
        
        if (distance < 150) {
          const angle = Math.atan2(mouseY - particleY, mouseX - particleX);
          const push = (150 - distance) / 5;
          particle.style.transform = `translate(${-Math.cos(angle) * push}px, ${-Math.sin(angle) * push}px)`;
        } else {
          particle.style.transform = 'translate(0, 0)';
        }
      });
    });

    // Button hover effect
    const ctaButton = document.querySelector('.cta-button');
    if (ctaButton) {
      ctaButton.addEventListener('mouseenter', function() {
        this.style.transform = 'translateY(-2px) scale(1.05)';
      });
      
      ctaButton.addEventListener('mouseleave', function() {
        this.style.transform = 'translateY(0) scale(1)';
      });
    }
  </script>
</body>
</html>
